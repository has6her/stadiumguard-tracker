<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StadiumGuard Issue Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f0f0f0; }
        h1 { color: #333; }
        .form-box, .filter-box { background: white; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        input, select, button { padding: 8px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button { background: #2e7d32; color: white; border: none; cursor: pointer; }
        .issue { background: white; padding: 10px; margin-bottom: 10px; border-radius: 8px; border-left: 5px solid #2e7d32; }
        .issue.High { border-left-color: red; }
        .issue.Medium { border-left-color: orange; }
        .issue.Low { border-left-color: green; }
        .actions button { width: auto; margin-right: 5px; background: #1565c0; }
        .actions .delete-btn { background: #c62828; }
    </style>
</head>
<body>

    <h1>StadiumGuard Issue Tracker</h1>

    <div class="form-box">
        <h3>Create New Issue</h3>
        <input type="text" id="title" placeholder="Title">
        <input type="text" id="description" placeholder="Description">
        <select id="severity">
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
            <option value="Critical">Critical</option>
        </select>
        <input type="text" id="reported_by" placeholder="Reported By">
        <button onclick="createIssue()">Create Issue</button>
    </div>

    <div class="filter-box">
        <h3>Filter Issues</h3>
        <select id="filterStatus" onchange="loadIssues()">
            <option value="">All Statuses</option>
            <option value="Open">Open</option>
            <option value="In Progress">In Progress</option>
            <option value="Resolved">Resolved</option>
            <option value="Closed">Closed</option>
        </select>
        <select id="filterSeverity" onchange="loadIssues()">
            <option value="">All Severities</option>
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
            <option value="Critical">Critical</option>
        </select>
    </div>

    <h3>Issues</h3>
    <div id="issuesList"></div>

    <script>
        const API_URL = "http://127.0.0.1:5000";

        async function loadIssues() {
            const status = document.getElementById('filterStatus').value;
            const severity = document.getElementById('filterSeverity').value;
            let url = `${API_URL}/issues?`;
            if (status) url += `status=${status}&`;
            if (severity) url += `severity=${severity}`;

            const res = await fetch(url);
            const data = await res.json();

            const list = document.getElementById('issuesList');
            list.innerHTML = '';

            data.forEach(issue => {
                const div = document.createElement('div');
                div.className = `issue ${issue.severity}`;
                div.innerHTML = `
                    <strong>#${issue.id} - ${issue.title}</strong> (${issue.severity} / ${issue.status})<br>
                    ${issue.description}<br>
                    Reported by: ${issue.reported_by}<br>
                    <div class="actions">
                        <button onclick="markResolved(${issue.id})">Mark Resolved</button>
                        <button class="delete-btn" onclick="deleteIssue(${issue.id})">Delete</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        async function createIssue() {
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            const severity = document.getElementById('severity').value;
            const reported_by = document.getElementById('reported_by').value;

            if (!title || !description) {
                alert("Title and description are required!");
                return;
            }

            await fetch(`${API_URL}/issues`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, description, severity, reported_by })
            });

            document.getElementById('title').value = '';
            document.getElementById('description').value = '';
            document.getElementById('reported_by').value = '';

            loadIssues();
        }

        async function markResolved(id) {
            await fetch(`${API_URL}/issues/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: 'Resolved' })
            });
            loadIssues();
        }

        async function deleteIssue(id) {
            await fetch(`${API_URL}/issues/${id}`, { method: 'DELETE' });
            loadIssues();
        }

        loadIssues();
    </script>

</body>
</html>
